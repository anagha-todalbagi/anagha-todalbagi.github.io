<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  /* 1200 × 630 — link-share card. Axiom System: ink surface, reversed lockup. */
  @font-face {
    font-family: "Instrument Serif";
    src: url("../fonts/InstrumentSerif-latin.woff2") format("woff2");
    font-weight: 400;
  }
  @font-face {
    font-family: "JetBrains Mono";
    src: url("../fonts/JetBrainsMono-latin.woff2") format("woff2");
    font-weight: 100 800;
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; }
  body {
    background: #1C1B1A;
    color: #FCFBF9;
    font-family: "Instrument Serif", Georgia, serif;
    position: relative;
    padding: 64px 72px;
  }
  .mono {
    font-family: "JetBrains Mono", monospace;
    font-size: 15px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .monogram {
    position: absolute;
    top: 64px;
    left: 72px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    font-size: 44px;
    line-height: 1;
  }
  .monogram .rule {
    width: 92px;
    height: 3px;
    background: #7B3550;
    margin: 12px 0;
  }
  .est {
    position: absolute;
    top: 72px;
    right: 72px;
    color: rgba(252, 251, 249, 0.55);
  }
  .lockup { position: absolute; left: 72px; bottom: 88px; }
  .name {
    font-size: 96px;
    line-height: 1.05;
    letter-spacing: 0;
  }
  .subline {
    margin-top: 26px;
    color: rgba(252, 251, 249, 0.72);
  }
</style>
</head>
<body>
  <div class="monogram"><span>A</span><span class="rule"></span><span>T</span></div>
  <p class="mono est">San Francisco</p>
  <div class="lockup">
    <p class="name">Anagha Todalbagi</p>
    <p class="mono subline">Product Leader&ensp;·&ensp;Deep Tech at Scale&ensp;·&ensp;AI-Native</p>
  </div>
</body>
</html>
