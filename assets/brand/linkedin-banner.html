<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  /* 1584 × 396 — LinkedIn banner. Name omitted on purpose: LinkedIn overlays
     the profile block on the left, so the lockup sits right. */
  @font-face {
    font-family: "Instrument Serif";
    src: url("../fonts/InstrumentSerif-latin.woff2") format("woff2");
    font-weight: 400;
  }
  @font-face {
    font-family: "Instrument Serif";
    src: url("../fonts/InstrumentSerif-italic-latin.woff2") format("woff2");
    font-weight: 400;
    font-style: italic;
  }
  @font-face {
    font-family: "JetBrains Mono";
    src: url("../fonts/JetBrainsMono-latin.woff2") format("woff2");
    font-weight: 100 800;
  }
  * { margin: 0; box-sizing: border-box; }
  html, body { width: 1584px; height: 396px; }
  body {
    background: #1C1B1A;
    color: #FCFBF9;
    font-family: "Instrument Serif", Georgia, serif;
    position: relative;
  }
  .lockup {
    position: absolute;
    right: 110px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 56px;
  }
  .quote {
    font-style: italic;
    font-size: 44px;
    color: rgba(252, 251, 249, 0.85);
    text-align: right;
  }
  .mono {
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(252, 251, 249, 0.55);
    text-align: right;
    margin-top: 16px;
  }
  .monogram {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    font-size: 40px;
    line-height: 1;
  }
  .monogram .rule {
    width: 84px;
    height: 3px;
    background: #7B3550;
    margin: 11px 0;
  }
</style>
</head>
<body>
  <div class="lockup">
    <div>
      <p class="quote">"Evidence over empty words."</p>
      <p class="mono">Product Leader&ensp;·&ensp;Deep Tech at Scale&ensp;·&ensp;AI-Native</p>
    </div>
    <div class="monogram"><span>A</span><span class="rule"></span><span>T</span></div>
  </div>
</body>
</html>
